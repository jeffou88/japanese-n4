<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日文 N4 學習 App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --surface: #fff; --border: #e2e0da;
    --primary: #2b5aa0; --accent: #c94a1a;
    --text: #1a1a1a; --muted: #666;
    --green: #2e7d5e; --phase1: #4f86c6; --phase2: #5bb37f; --phase3: #e07b39;
  }
  body { font-family: 'Segoe UI','Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }

  /* SIDEBAR */
  #sidebar { width:268px; min-width:268px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; height:100vh; position:sticky; top:0; overflow-y:auto; }
  #sidebar-header { padding:18px 16px 12px; border-bottom:1px solid var(--border); }
  #sidebar-header h1 { font-size:14px; font-weight:700; color:var(--primary); }
  #sidebar-header p { font-size:11px; color:var(--muted); margin-top:2px; }
  #progress-bar-wrap { padding:10px 16px; border-bottom:1px solid var(--border); }
  #progress-bar-wrap .label { font-size:11px; color:var(--muted); display:flex; justify-content:space-between; margin-bottom:4px; }
  #progress-bar-bg { background:var(--border); border-radius:99px; height:6px; }
  #progress-bar-fill { background:var(--primary); height:6px; border-radius:99px; transition:width .4s; width:0%; }
  #lesson-list { flex:1; padding:6px 0; }

  .phase-label { font-size:10px; font-weight:700; color:#fff; padding:4px 14px; margin:6px 8px 2px; border-radius:4px; }
  .phase-label.p1 { background:var(--phase1); }
  .phase-label.p2 { background:var(--phase2); }
  .phase-label.p3 { background:var(--phase3); }

  .lesson-btn { display:flex; align-items:center; gap:8px; width:100%; padding:7px 14px; background:none; border:none; cursor:pointer; text-align:left; transition:background .15s; border-left:3px solid transparent; }
  .lesson-btn:hover { background:#f0ede8; }
  .lesson-btn.active { background:#eef2fa; border-left-color:var(--primary); }
  .lesson-btn .num { width:24px; height:24px; border-radius:50%; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:var(--muted); flex-shrink:0; }
  .lesson-btn.done .num { background:var(--green); color:#fff; }
  .lesson-btn.active .num { background:var(--primary); color:#fff; }
  .lesson-btn .info { flex:1; min-width:0; }
  .lesson-btn .info .t { font-size:11px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lesson-btn .info .s { font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* MAIN */
  #main { flex:1; padding:26px 30px; overflow-y:auto; max-width:900px; }
  #lesson-header { margin-bottom:18px; }
  #lesson-header .phase { font-size:11px; font-weight:600; color:var(--primary); text-transform:uppercase; letter-spacing:.5px; }
  #lesson-header h2 { font-size:21px; font-weight:700; margin-top:4px; }
  #lesson-header p { font-size:13px; color:var(--muted); margin-top:4px; }

  /* TABS */
  #tab-bar { display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .tab-btn { padding:7px 16px; font-size:13px; font-weight:600; background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; color:var(--muted); transition:all .15s; margin-bottom:-1px; }
  .tab-btn:hover { color:var(--text); }
  .tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }

  /* STUDY */
  .section-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin:16px 0 8px; }
  .rule-box { background:#eef2fa; border:1px solid #c5d2ed; border-radius:8px; padding:12px 14px; margin-bottom:12px; }
  .rule-box h4 { font-size:13px; font-weight:700; color:var(--primary); margin-bottom:5px; }
  .rule-box p, .rule-box li { font-size:12px; color:#444; line-height:1.7; }
  .rule-box ul { padding-left:16px; }

  .grammar-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-bottom:12px; cursor:pointer; transition:border-color .15s, box-shadow .15s; }
  .grammar-card:hover { border-color:var(--primary); box-shadow:0 2px 10px rgba(0,0,0,.07); }
  .grammar-card .pattern { font-size:22px; font-weight:700; color:var(--primary); }
  .grammar-card .meaning { font-size:13px; color:var(--muted); margin-top:3px; }
  .grammar-card .example { font-size:13px; margin-top:8px; padding:8px 10px; background:#f7f6f3; border-radius:6px; }
  .grammar-card .example .jp { font-size:14px; }
  .grammar-card .example .tr { font-size:12px; color:var(--muted); margin-top:3px; }

  .vocab-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:9px; margin-bottom:18px; }
  .vocab-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:11px 13px; cursor:pointer; transition:border-color .15s, box-shadow .15s; }
  .vocab-card:hover { border-color:var(--primary); box-shadow:0 2px 8px rgba(0,0,0,.07); }
  .vocab-card .jp { font-size:19px; font-weight:600; }
  .vocab-card .reading { font-size:11px; color:var(--primary); margin-top:2px; }
  .vocab-card .meaning { font-size:12px; color:var(--muted); margin-top:3px; }

  /* FLASHCARD */
  #flashcard-view { display:flex; flex-direction:column; align-items:center; padding:18px 0; }
  #fc-progress { font-size:12px; color:var(--muted); margin-bottom:14px; }
  #fc-card-wrap { perspective:1000px; width:360px; height:230px; cursor:pointer; margin-bottom:18px; }
  #fc-inner { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform .4s; }
  #fc-inner.flipped { transform:rotateY(180deg); }
  .fc-face { position:absolute; width:100%; height:100%; backface-visibility:hidden; border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center; border:1px solid var(--border); padding:16px; }
  #fc-front { background:var(--surface); }
  #fc-back { background:#eef2fa; transform:rotateY(180deg); }
  #fc-front .char { font-size:52px; line-height:1; text-align:center; }
  #fc-front .hint { font-size:12px; color:#bbb; margin-top:10px; }
  #fc-back .reading { font-size:26px; font-weight:700; color:var(--primary); text-align:center; }
  #fc-back .meaning { font-size:15px; color:var(--muted); margin-top:6px; text-align:center; }
  #fc-back .example { font-size:11px; color:#999; margin-top:8px; text-align:center; font-style:italic; padding:0 12px; }
  #fc-controls { display:flex; gap:10px; align-items:center; }
  .fc-btn { padding:7px 20px; border-radius:8px; border:1px solid var(--border); background:var(--surface); cursor:pointer; font-size:13px; font-weight:600; transition:all .15s; }
  .fc-btn:hover { background:#f0ede8; }
  .fc-btn.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
  .fc-btn.primary:hover { background:#1e4585; }
  #fc-shuffle-btn { font-size:11px; color:var(--muted); background:none; border:none; cursor:pointer; text-decoration:underline; margin-top:10px; }

  /* QUIZ */
  #quiz-view { max-width:580px; }
  #quiz-progress-wrap { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
  #quiz-progress-bar-bg { flex:1; height:6px; background:var(--border); border-radius:99px; }
  #quiz-progress-bar-fill { height:6px; background:var(--primary); border-radius:99px; transition:width .3s; }
  #quiz-q-num { font-size:12px; color:var(--muted); white-space:nowrap; }
  #quiz-question { font-size:14px; font-weight:600; margin-bottom:6px; }
  #quiz-question-char { font-size:52px; text-align:center; margin:14px 0 18px; line-height:1.1; }
  .quiz-options { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
  .quiz-option { padding:13px 10px; border:2px solid var(--border); border-radius:10px; background:var(--surface); cursor:pointer; font-size:13px; font-weight:600; text-align:center; transition:all .15s; }
  .quiz-option:hover:not(:disabled) { border-color:var(--primary); background:#eef2fa; }
  .quiz-option.correct { border-color:var(--green); background:#edf7f3; color:var(--green); }
  .quiz-option.wrong { border-color:var(--accent); background:#fdf0ec; color:var(--accent); }
  .quiz-option:disabled { cursor:default; }
  #quiz-feedback { font-size:13px; min-height:20px; margin-bottom:12px; color:var(--muted); }
  #quiz-next-btn { padding:9px 26px; background:var(--primary); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
  #quiz-next-btn:hover { background:#1e4585; }
  #quiz-result { text-align:center; padding:28px 0; }
  #quiz-result .score-circle { width:110px; height:110px; border-radius:50%; border:5px solid var(--primary); display:flex; flex-direction:column; align-items:center; justify-content:center; margin:0 auto 18px; }
  #quiz-result .score-num { font-size:28px; font-weight:700; color:var(--primary); line-height:1; }
  #quiz-result .score-label { font-size:10px; color:var(--muted); }
  #quiz-result h3 { font-size:17px; margin-bottom:6px; }
  #quiz-result p { font-size:13px; color:var(--muted); margin-bottom:18px; }
  #quiz-result .btn-row { display:flex; gap:10px; justify-content:center; }
  .done-badge { display:inline-flex; align-items:center; gap:4px; background:#edf7f3; border:1px solid #b2deca; color:var(--green); font-size:11px; font-weight:700; padding:2px 9px; border-radius:99px; margin-left:8px; vertical-align:middle; }
</style>
<script src="https://code.responsivevoice.org/responsivevoice.js?key=FREE"></script>
</head>
<body>

<nav id="sidebar">
  <div id="sidebar-header">
    <h1>🇯🇵 日文 N4</h1>
    <p>前提：已完成 N5 課程</p>
  </div>
  <div id="progress-bar-wrap">
    <div class="label"><span>整體進度</span><span id="progress-text">0 / 50 堂</span></div>
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
  </div>
  <div id="lesson-list"></div>
</nav>

<main id="main">
  <div id="lesson-header">
    <div class="phase">N4 課程</div>
    <h2 id="lesson-title">請選擇課程開始學習</h2>
    <p id="lesson-subtitle">← 從左側選單選擇課程</p>
  </div>
  <div id="tab-bar" style="display:none">
    <button class="tab-btn active" onclick="switchTab('study')">📖 學習</button>
    <button class="tab-btn" onclick="switchTab('flashcard')">🃏 單字卡</button>
    <button class="tab-btn" onclick="switchTab('quiz')">✏️ 測驗</button>
  </div>
  <div id="study-view"></div>
  <div id="flashcard-view" style="display:none"></div>
  <div id="quiz-view" style="display:none"></div>
</main>

<script>
// ============================================================
// SPEECH
// ============================================================
let _jaVoice = null;
function _loadJaVoice() {
  const v = speechSynthesis.getVoices();
  _jaVoice = v.find(x => x.lang === 'ja-JP') || v.find(x => x.lang.startsWith('ja')) || null;
}
if (window.speechSynthesis) { speechSynthesis.addEventListener('voiceschanged', _loadJaVoice); _loadJaVoice(); }
function speak(text) {
  if (!text) return;
  // 優先用 ResponsiveVoice（跨平台日文語音，不依賴 OS 語音包）
  if (window.responsiveVoice) {
    responsiveVoice.speak(text, 'Japanese Female', { rate: 0.85 });
    return;
  }
  // 備援：Web Speech API，必須找到日文語音才說，否則不發音
  if (window.speechSynthesis) {
    if (!_jaVoice) _loadJaVoice();
    if (!_jaVoice) return; // 沒有日文語音，靜默（避免說中文）
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP'; u.rate = 0.85; u.voice = _jaVoice;
    speechSynthesis.speak(u);
  }
}

// ============================================================
// LESSONS DATA
// ============================================================
const LESSONS = [
  // ── PHASE 1: Grammar ──────────────────────────────────────
  {
    id:1, phase:1, title:'〜てから／〜た後で', subtitle:'動作順序表達',
    desc:'學習表示動作先後順序的兩個句型，掌握其差異與用法。',
    type:'grammar',
    items:[
      { front:'〜てから', back:'做完…之後', meaning:'做完…之後（強調順序）', example:'宿題をしてから、遊びます。', translation:'做完作業之後再玩。' },
      { front:'〜た後で', back:'在…之後', meaning:'在…之後（較寬鬆）', example:'食べた後で、歯を磨きます。', translation:'吃飯之後刷牙。' },
      { front:'〜前に', back:'在…之前', meaning:'在…之前', example:'寝る前に、日記を書きます。', translation:'睡覺之前寫日記。' },
    ],
    notes:'てから 強調 A 一定要在 B 之前完成；た後で 則較寬鬆，A 和 B 可以有時間間隔。'
  },
  {
    id:2, phase:1, title:'〜ている（狀態・習慣・職業）', subtitle:'ている 三種用法',
    desc:'〜ている 不只表示進行中，還可表示結果狀態、習慣及職業。',
    type:'grammar',
    items:[
      { front:'〜ている（進行）', back:'正在做…', meaning:'正在做…（動作進行中）', example:'今、本を読んでいます。', translation:'現在正在看書。' },
      { front:'〜ている（狀態）', back:'…著（結果狀態）', meaning:'…著（動作結果持續）', example:'窓が開いています。', translation:'窗戶開著。' },
      { front:'〜ている（習慣）', back:'一直都有在做…', meaning:'習慣性動作', example:'毎朝ジョギングをしています。', translation:'每天早上慢跑。' },
      { front:'〜ている（職業）', back:'從事…工作', meaning:'表示職業', example:'会社員をしています。', translation:'是上班族。' },
    ],
    notes:'同一句型四種語意，需靠上下文判斷。「結婚している」= 已婚狀態（不是「正在結婚」）。'
  },
  {
    id:3, phase:1, title:'〜てみる／〜ておく／〜てしまう', subtitle:'補助動詞三兄弟',
    desc:'三個重要的補助動詞，在 N4 考試中頻繁出現。',
    type:'grammar',
    items:[
      { front:'〜てみる', back:'試著做…', meaning:'試著做（有嘗試的意味）', example:'日本料理を作ってみます。', translation:'試著做做看日本料理。' },
      { front:'〜ておく', back:'事先做…/放著', meaning:'事先準備或讓狀態持續', example:'旅行前に予約しておきます。', translation:'旅行前先預約好。' },
      { front:'〜てしまう', back:'竟然做了…（遺憾）', meaning:'完全做完，帶有遺憾或意外', example:'財布を忘れてしまいました。', translation:'把錢包忘了（很懊悔）。' },
    ],
    notes:'口語中：〜てしまう → 〜ちゃう（非正式），〜ておく → 〜とく。'
  },
  {
    id:4, phase:1, title:'授受動詞：〜てあげる／くれる／もらう', subtitle:'給予與接受',
    desc:'掌握從三個方向描述恩惠行為的動詞用法，是 N4 重要考點。',
    type:'grammar',
    items:[
      { front:'〜てあげる', back:'（我）為別人做…', meaning:'我（或我方）為別人做某事', example:'友達に荷物を持ってあげました。', translation:'幫朋友拿了行李。' },
      { front:'〜てくれる', back:'別人為（我）做…', meaning:'別人為我（或我方）做某事', example:'先生が教えてくれました。', translation:'老師教了我（謝謝）。' },
      { front:'〜てもらう', back:'（我）請別人做…', meaning:'我請求別人為我做某事', example:'友達に手伝ってもらいました。', translation:'請朋友幫我（了）。' },
    ],
    notes:'方向判斷關鍵：あげる＝往外給，くれる＝往內給（對我），もらう＝我收到（主動請求）。'
  },
  {
    id:5, phase:1, title:'普通形（た形・現在形）', subtitle:'日常會話基礎',
    desc:'所有詞類的普通形活用，是後續引用節、名詞修飾、〜と思う 的基礎。',
    type:'grammar',
    items:[
      { front:'動詞（現在）', back:'食べる／飲む／する', meaning:'動詞辭書形 = 普通形現在', example:'毎日コーヒーを飲む。', translation:'每天喝咖啡。' },
      { front:'動詞（過去）', back:'食べた／飲んだ／した', meaning:'動詞た形 = 普通形過去', example:'昨日映画を見た。', translation:'昨天看了電影。' },
      { front:'い形容詞（普通形）', back:'高い→高かった', meaning:'い形容詞過去：〜い→〜かった', example:'あの映画は面白かった。', translation:'那部電影很有趣。' },
      { front:'な形容詞（普通形）', back:'きれいだ→きれいだった', meaning:'な形容詞過去：〜だ→〜だった', example:'子供の頃、元気だった。', translation:'小時候很有精神。' },
    ],
    notes:'名詞普通形：学生だ（現在）→ 学生だった（過去）→ 学生じゃない（否定）→ 学生じゃなかった（過去否定）。'
  },
  {
    id:6, phase:1, title:'普通形＋名詞修飾（連體節）', subtitle:'用句子修飾名詞',
    desc:'日文可以用整個句子（普通形）放在名詞前面當形容詞，是非常常用的語法。',
    type:'grammar',
    items:[
      { front:'動詞＋名詞', back:'[動詞普通形]＋名詞', meaning:'用動詞句修飾名詞', example:'昨日読んだ本はおもしろかった。', translation:'昨天讀的書很有趣。' },
      { front:'い形容詞＋名詞', back:'高い山／安い店', meaning:'い形容詞直接加名詞', example:'安くておいしいレストランを知っていますか。', translation:'你知道便宜又好吃的餐廳嗎？' },
      { front:'な形容詞＋名詞', back:'有名な＋名詞', meaning:'な形容詞去だ加な', example:'有名な先生に会いました。', translation:'見到了有名的老師。' },
      { front:'名詞＋の＋名詞', back:'日本の文化', meaning:'名詞修飾名詞用の', example:'友達の妹さんはかわいいです。', translation:'朋友的妹妹很可愛。' },
    ],
    notes:'這是日文「定語從句」的概念，相當於英文的關係代名詞 who/which/that，但日文放在名詞前面。'
  },
  {
    id:7, phase:1, title:'〜と思う／〜と言う', subtitle:'引用節',
    desc:'用普通形＋と引用自己的想法或轉述他人的說話。',
    type:'grammar',
    items:[
      { front:'〜と思います', back:'我認為…', meaning:'表達個人意見或推測', example:'明日は雨だと思います。', translation:'我認為明天會下雨。' },
      { front:'〜と言いました', back:'（某人）說了…', meaning:'引用他人說的話（直接或間接）', example:'先生は「早く来い」と言いました。', translation:'老師說「快來」。' },
      { front:'〜と言っていました', back:'（某人）說…', meaning:'轉述他人說的話（間接）', example:'彼は疲れたと言っていました。', translation:'他說他累了。' },
      { front:'〜と聞きました', back:'聽說…', meaning:'傳達聽來的資訊', example:'来週、試験があると聞きました。', translation:'聽說下週有考試。' },
    ],
    notes:'と前面接普通形（動詞辭書形/た形、形容詞普通形、名詞だ）。禮貌體和普通體在と前面都要換成普通形。'
  },
  {
    id:8, phase:1, title:'〜かもしれない／〜でしょう', subtitle:'推測語氣',
    desc:'表達不確定的推測，兩者確信程度不同。',
    type:'grammar',
    items:[
      { front:'〜かもしれない', back:'也許…/說不定…', meaning:'不確定的可能性（50%以下）', example:'明日、試験があるかもしれない。', translation:'明天也許有考試。' },
      { front:'〜でしょう', back:'大概是…吧', meaning:'較有把握的推測，或詢問確認', example:'明日は晴れでしょう。', translation:'明天大概是晴天吧。' },
      { front:'〜だろう', back:'大概…吧（普通形）', meaning:'でしょう 的普通形，男性常用', example:'彼は来ないだろう。', translation:'他大概不會來吧。' },
    ],
    notes:'確信度：はずだ（應該）> でしょう（大概）> かもしれない（也許）> らしい（聽說）。'

// ============================================================
// HELPERS
// ============================================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getLessonItems(lesson) {
  if (!lesson) return [];
  if (lesson.type === 'grammar') {
    return (lesson.items || []).map(it => ({
      front: it.front, back: it.back, meaning: it.meaning || it.back,
      example: it.example, translation: it.translation
    }));
  }
  if (lesson.type === 'vocab') {
    const items = [];
    (lesson.groups || []).forEach(g => g.items.forEach(v => {
      items.push({ front: v.jp, back: v.ro, meaning: v.meaning });
    }));
    return items;
  }
  if (lesson.type === 'review') {
    const phase = lesson.phase;
    const sourceIds = phase === 3
      ? LESSONS.filter(l => l.id < lesson.id && l.type !== 'review').map(l => l.id)
      : LESSONS.filter(l => l.id < lesson.id && l.phase === phase && l.type !== 'review').map(l => l.id);
    const items = [];
    sourceIds.forEach(id => {
      const src = LESSONS.find(l => l.id === id);
      if (src) items.push(...getLessonItems(src).slice(0, 5));
    });
    return shuffle([...items]);
  }
  return [];
}

function renderSidebar() {
  const list = document.getElementById('lesson-list');
  const phases = [
    { id: 1, label: '第一階段：N4 核心文法', cls: 'p1', range: [1, 30] },

    { id: 3, label: '第三階段：模擬考衝刺', cls: 'p3', range: [46, 50] },
  ];
  let html = '';
  phases.forEach(ph => {
    html += `<div class="phase-label ${ph.cls}">${ph.label}</div>`;
    LESSONS.filter(l => l.phase === ph.id).forEach(l => {
      const done = state.progress[l.id];
      const active = state.currentLesson && state.currentLesson.id === l.id;
      html += `<button class="lesson-btn${done ? ' done' : ''}${active ? ' active' : ''}" onclick="loadLesson(${l.id})">

// LOAD LESSON
// ============================================================
function loadLesson(id) {
  state.currentLesson = LESSONS.find(l => l.id === id);
  state.currentTab = 'study';
  state.fcIndex = 0; state.fcFlipped = false;
  const l = state.currentLesson;
  const phaseLabel = l.phase === 1 ? '第一階段・文法' : l.phase === 2 ? '第二階段・單字漢字' : '第三階段・模擬考';
  document.querySelector('#lesson-header .phase').textContent = phaseLabel;
  document.getElementById('lesson-title').innerHTML =
    `第 ${id} 堂　${l.title}` + (state.progress[id] ? ' <span class="done-badge">✓ 完成</span>' : '');
  document.getElementById('lesson-subtitle').textContent = l.desc;
  document.getElementById('tab-bar').style.display = '';
  renderStudy();
  document.getElementById('flashcard-view').style.display = 'none';
  document.getElementById('quiz-view').style.display = 'none';
  document.getElementById('study-view').style.display = '';
  setActiveTab('study');
  renderSidebar();
}

function switchTab(tab) {
  state.currentTab = tab;
  setActiveTab(tab);
  document.getElementById('study-view').style.display = tab === 'study' ? '' : 'none';
  document.getElementById('flashcard-view').style.display = tab === 'flashcard' ? '' : 'none';
  document.getElementById('quiz-view').style.display = tab === 'quiz' ? '' : 'none';
  if (tab === 'flashcard') renderFlashcard();
  if (tab === 'quiz') startQuiz();
}

function setActiveTab(tab) {
  const tabs = ['study', 'flashcard', 'quiz'];
  document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', tabs[i] === tab));
}

// STUDY MODE
// ============================================================
function renderStudy() {
  const l = state.currentLesson;
  let html = '';

  if (l.type === 'grammar') {
    if (l.notes) html += `<div class="rule-box"><h4>📌 學習要點</h4><p>${l.notes}</p></div>`;
    html += '<div class="section-label">句型詳解（點擊聆聽）</div>';
    (l.items || []).forEach(it => {
      html += `<div class="grammar-card" data-speak="${it.front}" onclick="speak(this.dataset.speak)">
        <div class="pattern">${it.front}</div>
        <div class="meaning">${it.meaning || it.back}</div>
        <div class="example" data-speak="${it.example}" onclick="event.stopPropagation();speak(this.dataset.speak)" title="點擊朗讀例句">
          <div class="jp">例：${it.example}</div>
          <div class="tr">${it.translation}</div>
        </div>
      </div>`;
    });
  }
  else if (l.type === 'vocab') {
    (l.groups || []).forEach(g => {
      html += `<div class="section-label">${g.label}</div><div class="vocab-grid">`;
      g.items.forEach(v => {
        html += `<div class="vocab-card" data-speak="${v.jp}" onclick="speak(this.dataset.speak)">
          <div class="jp">🔊 ${v.jp}</div>
          <div class="reading">${v.ro}</div>
          <div class="meaning">${v.meaning}</div>
        </div>`;
      });
      html += '</div>';
    });
  }
  else if (l.type === 'review') {
    const phaseNames = {1:'文法句型', 2:'單字・漢字', 3:'全科'};
    html += `<div class="rule-box">
      <h4>🎯 複習目標</h4>
      <p>本堂課綜合測驗前面所有課程內容（${phaseNames[l.phase] || '全科'}）。</p>
      <p style="margin-top:6px">建議先點「單字卡」快速瀏覽，再挑戰「測驗」！</p>
    </div>`;
    const sourceIds = l.phase === 3
      ? LESSONS.filter(x => x.id < l.id && x.type !== 'review').map(x => x.id)
      : LESSONS.filter(x => x.id < l.id && x.phase === l.phase && x.type !== 'review').map(x => x.id);
    html += '<div class="section-label">包含課程</div>';
    sourceIds.forEach(id => {
      const src = LESSONS.find(x => x.id === id);
      const done = state.progress[id];
      html += `<div style="display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px">
        <span style="font-size:14px">${done ? '✅' : '⬜'}</span>
        <div>
          <div style="font-size:12px;font-weight:600">第${id}堂 ${src.title}</div>
          <div style="font-size:11px;color:var(--muted)">${src.subtitle}</div>
        </div>
      </div>`;
    });
  }

  document.getElementById('study-view').innerHTML = html;
}

function renderFlashcard() {
  state.fcItems = shuffle([...getLessonItems(state.currentLesson)]);
  state.fcIndex = 0; state.fcFlipped = false;
  renderFcCard();
}

function renderFcCard() {
  const items = state.fcItems;
  if (!items.length) {
    document.getElementById('flashcard-view').innerHTML = '<p style="text-align:center;color:var(--muted);padding:40px">本堂課尚無單字卡內容</p>';
    return;
  }
  const idx = state.fcIndex;
  const item = items[idx];
  document.getElementById('flashcard-view').innerHTML = `
    <div id="fc-progress">${idx + 1} / ${items.length}</div>
    <div id="fc-card-wrap" onclick="flipCard()">
      <div id="fc-inner">
        <div class="fc-face" id="fc-front">
          <div class="char">${item.front}</div>
          <div class="hint">點擊翻面查看答案</div>
        </div>
        <div class="fc-face" id="fc-back">
          <div class="reading">${item.back}</div>
          ${item.meaning && item.meaning !== item.back ? `<div class="meaning">${item.meaning}</div>` : ''}
          ${item.example ? `<div class="example">${item.example}<br><span style="color:#bbb">${item.translation||''}</span></div>` : ''}
        </div>
      </div>
    </div>
    <div id="fc-controls">
      <button class="fc-btn" onclick="fcNav(-1)" ${idx===0?'disabled style="opacity:.4"':''}>← 上一張</button>
      <button class="fc-btn primary" onclick="fcNav(1)">${idx===items.length-1?'完成 🎉':'下一張 →'}</button>
    </div>
    <button id="fc-shuffle-btn" onclick="fcShuffle()">🔀 隨機排列</button>
  `;
  if (state.fcFlipped) document.getElementById('fc-inner').classList.add('flipped');
}

function flipCard() {
  state.fcFlipped = !state.fcFlipped;
  const inner = document.getElementById('fc-inner');
  if (inner) inner.classList.toggle('flipped', state.fcFlipped);
  if (state.fcFlipped) {
    const item = state.fcItems[state.fcIndex];
    if (item) speak(item.front);
  }
}

function fcNav(dir) {
  const total = state.fcItems.length;
  state.fcIndex = Math.max(0, Math.min(total - 1, state.fcIndex + dir));
  state.fcFlipped = false;
  if (dir === 1 && state.fcIndex === total - 1) markDone();
  renderFcCard();
}

function fcShuffle() {
  state.fcItems = shuffle([...state.fcItems]);
  state.fcIndex = 0; state.fcFlipped = false;
  renderFcCard();
}

// ============================================================
// QUIZ
// ============================================================
function startQuiz() {
  const all = getLessonItems(state.currentLesson);
  if (!all.length) {
    document.getElementById('quiz-view').innerHTML = '<p style="text-align:center;color:var(--muted);padding:40px">本堂課尚無測驗題目</p>';
    return;
  }
  state.quizItems = shuffle([...all]).slice(0, Math.min(10, all.length));
  state.quizIndex = 0; state.quizScore = 0; state.quizAnswered = false;
  renderQuizQ();
}

function renderQuizQ() {
  const items = state.quizItems;
  const idx = state.quizIndex;
  if (idx >= items.length) { renderQuizResult(); return; }

  const q = items[idx];
  const total = items.length;
  const isVocab = !!q.meaning;
  const getKey = it => isVocab ? it.meaning : it.back;

  const allItems = getLessonItems(state.currentLesson);
  const usedKeys = new Set([getKey(q)]);
  const others = shuffle(allItems.filter(i => {
    const k = getKey(i);
    if (usedKeys.has(k)) return false;
    usedKeys.add(k); return true;
  })).slice(0, 3);
  const options = shuffle([q, ...others]);

  state.quizCorrect = getKey(q);
  const questionText = isVocab ? '以下字/句型的意思是？' : '以下字/詞的讀音是？';
  const pct = (idx / total) * 100;

  document.getElementById('quiz-view').innerHTML = `
    <div id="quiz-progress-wrap">
      <div id="quiz-progress-bar-bg"><div id="quiz-progress-bar-fill" style="width:${pct}%"></div></div>
      <span id="quiz-q-num">${idx + 1} / ${total}</span>
    </div>
    <div id="quiz-question">${questionText}</div>
    <div id="quiz-question-char">${q.front}</div>
    <div class="quiz-options" id="quiz-options"></div>
    <div id="quiz-feedback"></div>
    <button id="quiz-next-btn" onclick="nextQuiz()" style="display:none">繼續 →</button>
  `;
  state.quizAnswered = false;

  const container = document.getElementById('quiz-options');
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.dataset.value = getKey(opt);
    btn.textContent = getKey(opt);
    btn.addEventListener('click', () => answerQuiz(btn));
    container.appendChild(btn);
  });
}

function answerQuiz(clickedBtn) {
  if (state.quizAnswered) return;
  state.quizAnswered = true;
  const chosen = clickedBtn.dataset.value;
  const correct = state.quizCorrect;
  const isCorrect = chosen === correct;

  document.querySelectorAll('.quiz-option').forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.value === correct) btn.classList.add('correct');
    else if (btn === clickedBtn) btn.classList.add('wrong');
  });

  if (isCorrect) {
    state.quizScore++;
    document.getElementById('quiz-feedback').innerHTML =
      '<span style="color:var(--green);font-weight:700">✓ 正確！</span>';
    const q = state.quizItems[state.quizIndex];
    speak(q.front);
    setTimeout(() => nextQuiz(), 1400);
  } else {
    document.getElementById('quiz-feedback').innerHTML =
      `<span style="color:var(--accent);font-weight:700">✗ 正確答案是「${correct}」</span>`;
    document.getElementById('quiz-next-btn').style.display = 'block';
  }
}

function nextQuiz() {
  state.quizIndex++;
  state.quizAnswered = false;
  renderQuizQ();
}

function renderQuizResult() {
  const score = state.quizScore;
  const total = state.quizItems.length;
  const pct = Math.round((score / total) * 100);
  const pass = pct >= 70;
  if (pass) markDone();
  const msg = pct===100?'完美！全部答對 🎉':pct>=80?'非常好！繼續加油！':pct>=60?'還不錯，再複習一下！':'繼續努力，多練習單字卡！';

  document.getElementById('quiz-view').innerHTML = `
    <div id="quiz-result">
      <div class="score-circle">
        <div class="score-num">${score}/${total}</div>
        <div class="score-label">答對題數</div>
      </div>
      <h3>${msg}</h3>
      <p>得分率 ${pct}%${pass?'　<span class="done-badge">✓ 通過</span>':''}</p>
      <div class="btn-row">
        <button class="fc-btn" onclick="startQuiz()">🔁 再測一次</button>
        <button class="fc-btn primary" onclick="switchTab('flashcard')">🃏 複習單字卡</button>
      </div>
    </div>
  `;
}

function markDone() {
  if (!state.progress[state.currentLesson.id]) {
    state.progress[state.currentLesson.id] = true;
    saveProgress();
    document.getElementById('lesson-title').innerHTML =
      `第 ${state.currentLesson.id} 堂　${state.currentLesson.title} <span class="done-badge">✓ 完成</span>`;
    renderSidebar();
  }
}

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  if (state.currentTab === 'flashcard') {
    if (e.key === 'ArrowRight' || e.key === 'l') fcNav(1);
    if (e.key === 'ArrowLeft'  || e.key === 'h') fcNav(-1);
    if (e.key === ' ') { e.preventDefault(); flipCard(); }
  }
  if (state.currentTab === 'quiz' && state.quizAnswered && e.key === 'Enter') nextQuiz();
});

// ============================================================
// INIT
// ============================================================
renderSidebar();
const first = LESSONS.find(l => !state.progress[l.id]) || LESSONS[0];
loadLesson(first.id);
</script>
</body>
</html>
